<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profertil Pattern Generator</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar workspace-module draggable-section slot-item" id="sidebar-module" data-module-id="sidebar" data-slot-group="module">
        <div class="brand-block">
          <span class="eyebrow">Bong x Profertil</span>
          <h1>Pattern Generator</h1>
          <p>
            Generador rápido para construir patrones del sistema Profertil con preview,
            combinaciones cromáticas y exportación lista para diseño.
          </p>
        </div>

        <section class="panel">
          <div class="panel-head">
            <h2>Forma base</h2>
          </div>
          <label class="field">
            <div class="shape-select-row">
              <button class="shape-nav" id="shape-prev" type="button" aria-label="Forma anterior">‹</button>
              <select id="shape-select"></select>
              <button class="shape-nav" id="shape-next" type="button" aria-label="Forma siguiente">›</button>
            </div>
          </label>
          <div class="shape-card">
            <div class="shape-thumb" id="shape-thumb"></div>
            <div class="shape-meta">
              <strong id="shape-name">Cargando...</strong>
              <span id="shape-dimensions">-</span>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Color</h2>
          </div>
          <div class="field">
            <div class="shape-select-row">
              <button class="shape-nav" id="palette-prev" type="button" aria-label="Color anterior">‹</button>
              <div class="color-select-display" id="color-select-display"></div>
              <button class="shape-nav" id="palette-next" type="button" aria-label="Color siguiente">›</button>
            </div>
          </div>
          <div class="palette-grid" id="palette-grid"></div>
          <label class="pretty-switch" for="invert-colors">
            <input type="checkbox" id="invert-colors" />
            <span class="pretty-switch-track">
              <span class="pretty-switch-thumb"></span>
            </span>
            <span class="pretty-switch-label">Invertir figura/fondo</span>
          </label>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Variables generativas</h2>
          </div>
          <div class="field">
            <span>Estructura</span>
            <div class="pill-group" id="layout-pills"></div>
          </div>
          <div class="slider-stack" id="slider-stack"></div>
        </section>
      </aside>

      <main class="preview-module workspace-module draggable-section slot-item" id="preview-module" data-module-id="preview" data-slot-group="module">
        <section class="preview-stage">
          <div class="preview-frame" id="preview-frame">
            <div class="preview-surface">
              <svg id="preview-svg" xmlns="http://www.w3.org/2000/svg" aria-label="Pattern preview"></svg>
            </div>
          </div>
        </section>
      </main>

      <footer class="control-dock workspace-module draggable-section slot-item" id="dock-module" data-module-id="dock" data-slot-group="module">
        <div class="dock-cluster" id="ratio-dock">
          <div class="pill-group" id="ratio-pills"></div>
        </div>

        <div class="dock-cluster" id="export-dock">
          <div class="pill-group" id="export-format-pills"></div>
          <button class="export-button" id="export-button" type="button">Exportar</button>
        </div>
      </footer>
    </div>

    <a class="bong-credit" href="https://bongstudio.ar" target="_blank" rel="noreferrer">
      <span>Desarrollado por</span>

    <script src="./script.js"></script>
  </body>
  </html>
